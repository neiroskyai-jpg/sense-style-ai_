# Amvera Cloud (РФ) — деплой веб-демо из Dockerfile.
# Секреты (OPENROUTER_API_KEY) и SENSE_MODE/DEMO_DAILY_LIMIT задаются в ПАНЕЛИ Amvera
# (переменные окружения), в репозиторий не коммитим.
meta:
  environment: docker
  toolchain:
    name: docker
build:
  dockerfile: ./Dockerfile
run:
  containerPort: 80        # приложение слушает 0.0.0.0:80 (gunicorn в Dockerfile)
  persistenceMount: /data  # постоянный том под SQLite (SENSE_DATA_DIR=/data)
