# Amvera Cloud (РФ) — Python-режим (совпадает с панелью: python / pip).
# Секреты (OPENROUTER_API_KEY) и SENSE_MODE/DEMO_DAILY_LIMIT — в «Переменные» панели Amvera.
meta:
  environment: python
  toolchain:
    name: pip
    version: "3.11"
build:
  requirementsPath: requirements.txt
run:
  command: gunicorn app.main:app --bind 0.0.0.0:80 --timeout 300 --workers 1 --threads 8
  containerPort: 80
  persistenceMount: /data
